<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso Importante - Calculadora IMC</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            text-align: center;
            border-top: 5px solid #e74c3c; /* Cor de alerta */
        }
        h1 {
            color: #e74c3c;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 25px;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Aviso Importante</h1>
        <p>
            O resultado fornecido por esta calculadora de IMC é <strong>meramente informativo</strong>. 
            Este cálculo baseia-se em médias populacionais e <strong>não substitui</strong>, em hipótese alguma, uma consulta médica ou a avaliação diagnóstica por profissionais de saúde.
        </p>
        <a href="javascript:history.back()" class="btn">Voltar para a Calculadora</a>
    </div>

</body>
</html>
