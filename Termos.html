<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso Importante - Calculadora IMC</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f4f7f6, #e3edf7);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 520px;
            text-align: center;
            border-top: 6px solid #e74c3c;
            animation: fadeIn 0.5s ease;
        }

        h1 {
            color: #e74c3c;
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.05rem;
            margin-bottom: 25px;
            color: #555;
        }

        strong {
            color: #2c3e50;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: #3498db;
            color: white;
            padding: 12px 22px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 20px;
            }

            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Aviso Importante</h1>

        <p>
            O resultado fornecido por esta calculadora de IMC é <strong>meramente informativo</strong>.
            Este cálculo baseia-se em médias populacionais e <strong>não substitui</strong>, em hipótese alguma,
            uma consulta médica ou avaliação profissional.
        </p>

        <a class="btn" onclick="voltar()">Voltar para a Calculadora</a>
    </div>

    <script>
        function voltar() {
            window.location.href = "https://madmooks.github.io/Calculadora-IMC/";
                
                // ou, se estiver no GitHub Pages:
                // window.location.href = "index.html";
            }
        }
    </script>

</body>
</html>
