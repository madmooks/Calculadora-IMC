<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC | Saúde e Bem-estar</title>
    <style>
        /* Variáveis de Cores para facilitar manutenção */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --text-color: #34495e;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-color);
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 30px;
        }

        /* Container Principal */
        .main-container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease;
        }

        /* Estilização do Iframe */
        .iframe-wrapper {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #fff;
        }

        iframe { 
            width: 100%; 
            height: 600px;
            border: none;
            display: block;
        }

        /* Aviso Médico Estilizado */
        .aviso-medico { 
            font-size: 0.85rem; 
            color: #7f8c8d; 
            margin: 25px auto; 
            max-width: 600px;
            line-height: 1.6;
            padding: 15px;
            border-left: 4px solid #f1c40f; /* Barra de atenção amarela */
            background-color: #fffde7;
            border-radius: 4px;
            text-align: left;
        }

        /* Rodapé e Links */
        footer { 
            margin-top: 40px; 
            padding-bottom: 20px;
            border-top: 1px solid #dee2e6;
            width: 100%;
            max-width: 700px;
            text-align: center;
        }

        .footer-links {
            margin-top: 15px;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin: 0 10px;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        .separator {
            color: #ced4da;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            body { padding: 20px 10px; }
            h1 { font-size: 1.5rem; }
            iframe { height: 650px; }
        }
    </style>
</head>
